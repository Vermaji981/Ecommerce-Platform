<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/webp" href="../slider/worker image.webp">
    <link rel="stylesheet" href="../css/systemstyle.css">
</head>
<body class="auth-body">
    <div class="top-nav-bar auth-nav">
        <div class="search-box">
            <a href="system.html" aria-label="Back to home"><img src="../icon/website icon.png" class="logo" alt="Website logo"></a>
        </div>
        <div class="menu-bar">
            <ul>
                <li><a href="system.html"><i class="fa-solid fa-house"></i>Home</a></li>
                <li><a href="login.html"><i class="fa-regular fa-circle-user"></i>Login</a></li>
            </ul>
        </div>
    </div>

    <main class="auth-page">
        <section class="auth-panel">
            <div class="auth-media">
                <img src="../slider/worker image.webp" alt="Delivery service">
            </div>
            <form class="auth-form">
                <h1>Create Account</h1>
                <p>Register to shop faster and track your orders.</p>

                <label for="name">Full name</label>
                <div class="auth-input">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>

                <label for="email">Email address</label>
                <div class="auth-input">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <label for="phone">Mobile number</label>
                <div class="auth-input">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="phone" placeholder="Enter your mobile number" required>
                </div>

                <label for="password">Password</label>
                <div class="auth-input">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Create password" required>
                </div>

                <button type="submit" class="auth-btn"><i class="fa-solid fa-user-plus"></i>Register</button>
                <p class="auth-switch">Already have account? <a href="login.html">Login here</a></p>
            </form>
        </section>
    </main>
</body>
</html>
